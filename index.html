<!DOCTYPE html>
<html>
    <head>
        <link rel = "stylesheet" href = "style.css">
    </head>
    <body>
        <div id = "topBar">
            <p id = "welcomeopen">ClownOS</p>
            <p id = "timeEl">6:20PM 7/4/26</p>
        </div>
        <div id = "content">
            <div class = "windowApp active" id = "welcome">
                <div id = "winTop">
                    <span id = "welcomehead"><span id = "welcomeclose"></span><span id = "welcomeminimize"></span><p id = "welcomeheader">WELCOME</p></span>
                </div>
                <div id = "winCont">
                    <p>welcome to clownOS</p>
                    <p>more text here</p>
                </div>
            </div>
            <div id = "desktopApps">
                <button>
                    <div class = "app" id = "appopen">
                        <p id = "appIcon"></p>
                        <p>name of app</p>
                    </div>
                </button>
                <button>
                    <div class = "app" id = "timeropen">
                        <p id = "timerIcon"></p>
                        <p>timer</p>
                    </div>
                </button>
            </div>
            <div class = "windowApp" id = "app">
                <div id = "appTop">
                    <span id = "apphead"><span id = "appclose"></span><span id = "appminimize"></span><p id = "appheader">app</p></span>
                </div>
                <div id = "appCont">
                    <p>welcome to app</p>
                    <p>more text here</p>
                </div>
            </div>
            <div class = "windowApp" id = "timer">
                <div id = "timerTop">
                    <span id = "timerhead"><span id = "timerclose"></span><span id = "timerminimize"></span><p id = "timerheader">timer</p></span>
                </div>
                <div id = "timerCont">
                    <p id = "countdownP">0:00:00</p>
                    <div id = "timerIput">
                        <p>H:</p> <input type = "number" id = "hourInput" class = "timerInput">
                        <p>M:</p><input type = "number" id = "minuteInput" class = "timerInput">
                        <p>S:</p><input type = "number" id = "secondInput" class = "timerInput">
                        <br>
                        <button id = "startTimer" onclick = "startTimer()">START</button>
                    </div>
                    
                </div>
            </div>
            <div id = "bottomBar">
                <span id = "welcomeTab" class = "bottomIcon"><img src = "./images/clownOSIcon.png"></span>
                <span id = "appTab" class = "bottomIcon"><img src = "./images/appIcon.png"></span>
                <span id = "timerTab" class = "bottomIcon"><img src = "./images/timerIcon.png"></span>
            </div>
        </div>
        <script src = "script.js"></script>
    </body>
</html>
